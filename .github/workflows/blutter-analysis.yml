name: Blutter APK Analysis

on:
  workflow_dispatch:

jobs:
  blutter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: '3.12'

      - name: Install Blutter and dependencies
        run: |
          git clone https://github.com/worawit/blutter.git
          pip install pyelftools capstone requests

      - name: Download APK and extract ARM64 .so files
        run: |
          wget -q https://dl.banglio.com/apk/nigeria-3.5.3-batch.apk -O zapero.apk
          mkdir -p libs
          unzip -j zapero.apk "lib/arm64-v8a/libapp.so" -d libs/
          unzip -j zapero.apk "lib/arm64-v8a/libflutter.so" -d libs/
          ls -la libs/

      - name: Run Blutter on ARM64 libraries
        run: |
          python blutter/blutter.py libs blutter_output

      - name: Search for API endpoints
        run: |
          echo "=== API Endpoints ===" > api_endpoints.txt
          grep -rE "(https?://|wss?://)[^\"' ]*(confirm|validate|verify|link|pairing|code|whatsapp)" blutter_output/ >> api_endpoints.txt || echo "No endpoints found" >> api_endpoints.txt
          echo "" >> api_endpoints.txt
          echo "=== All URLs ===" >> api_endpoints.txt
          grep -rEo "https?://[a-zA-Z0-9._/-]+" blutter_output/ 2>/dev/null | sort -u >> api_endpoints.txt || echo "No URLs" >> api_endpoints.txt
          cat api_endpoints.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blutter-results
          path: |
            blutter_output/
            api_endpoints.txt

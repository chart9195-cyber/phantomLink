name: PhantomLink CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6 AM UTC

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          npm install
      - name: Lint with ruff
        run: ruff check phantom/ tests/
      - name: Type check with mypy
        run: mypy phantom/ --ignore-missing-imports
      - name: Test with pytest
        run: pytest tests/ -v --cov=phantom --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  package-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify package builds
        run: |
          pip install build
          python -m build
      - name: Verify CLI entry point
        run: |
          pip install .
          phantomlink --help

  termux-simulation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Simulate Termux environment
        run: |
          pip install -e .
          phantomlink --version
          phantomlink --check
          phantomlink --list-targets

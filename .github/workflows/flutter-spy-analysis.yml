name: Flutter-Spy APK Analysis

on:
  workflow_dispatch:

jobs:
  spy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install jadx
        run: |
          curl -L -o jadx.zip https://github.com/skylot/jadx/releases/download/v1.5.4/jadx-1.5.4.zip
          unzip jadx.zip -d jadx_dir
          echo "$(pwd)/jadx_dir/bin" >> $GITHUB_PATH

      - name: Clone and install Flutter-Spy
        run: |
          git clone https://github.com/AbhiTheModder/flutter-spy.git
          cd flutter-spy
          chmod +x INSTALLER.sh
          bash INSTALLER.sh
          source ~/.profile

      - name: Download APK and run Flutter-Spy
        run: |
          wget -q https://dl.banglio.com/apk/nigeria-3.5.3-batch.apk -O zapero.apk
          cd flutter-spy
          source ~/.profile
          flutterspy ../zapero.apk
          mkdir -p ../output
          mv *.json *.txt ../output/ 2>/dev/null || true
          ls -la ../output/

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: flutter-spy-results
          path: output/

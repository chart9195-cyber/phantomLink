name: Security Scans

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 8 * * *'  # Daily 8 AM UTC

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      - run: pip-audit --requirement requirements.txt

  zizmor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - run: |
          curl -LsSf https://github.com/zizmorcore/zizmor/releases/download/v1.23.0/zizmor-x86_64-unknown-linux-musl.tar.gz | tar xz
          ./zizmor --pedantic .github/workflows/

  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: "3.12"
      - run: pip install bandit
      - run: bandit -r phantom/ -c pyproject.toml -ll

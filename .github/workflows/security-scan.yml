name: Security Scans

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 8 * * *'  # Daily 8 AM UTC

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      - run: pip-audit --requirement requirements.txt

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: "3.12"
      - run: pip install bandit
      - run: bandit -r phantom/ -c pyproject.toml -ll

  zizmor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Download latest zizmor
        run: |
          LATEST_URL=$(curl -s https://api.github.com/repos/zizmorcore/zizmor/releases/latest | grep browser_download_url | grep linux-musl | grep -v sha256 | head -1 | cut -d'"' -f4)
          echo "Downloading $LATEST_URL"
          curl -LsSf "$LATEST_URL" | tar xz
      - run: ./zizmor --pedantic .github/workflows/

name: Waydroid APK Analysis

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'URL of the APK to analyze'
        required: true
        default: 'https://dl.banglio.com/apk/nigeria-3.5.3-batch.apk'
      ghost_number:
        description: 'Ghost number to use (without +)'
        required: true
        default: '2348098765432'

jobs:
  analyze:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup KVM
        run: |
          sudo apt update
          sudo apt install -y qemu-kvm libvirt-daemon-system
          sudo adduser $USER kvm
      - name: Install Waydroid
        run: |
          sudo apt install -y curl ca-certificates
          curl -s https://repo.waydro.id | sudo bash
          sudo apt install -y waydroid
      - name: Initialize Waydroid
        run: |
          sudo waydroid init -s GAPPS
          sudo waydroid session start &
          sleep 30
          waydroid status
      - name: Install Frida
        run: |
          pip install frida-tools
          wget https://github.com/frida/frida/releases/download/16.5.7/frida-server-16.5.7-android-x86_64.xz
          unxz frida-server-16.5.7-android-x86_64.xz
          chmod +x frida-server-16.5.7-android-x86_64
      - name: Push Frida server to Waydroid
        run: |
          waydroid app install frida-server-16.5.7-android-x86_64 || true
          # Start Frida server inside Waydroid
          waydroid shell /data/local/tmp/frida-server &
      - name: Download and install APK
        run: |
          wget "${{ inputs.apk_url }}" -O zapero.apk
          waydroid app install zapero.apk
      - name: Run Frida hook to capture HTTP requests
        run: |
          cat > capture.js << 'FRIDA'
          Java.perform(function() {
            var OkHttpClient = Java.use("okhttp3.OkHttpClient");
            OkHttpClient.newCall.implementation = function(request) {
              console.log("[HTTP] " + request.method() + " " + request.url());
              var headers = request.headers();
              for (var i = 0; i < headers.size(); i++) {
                console.log("[HEADER] " + headers.name(i) + ": " + headers.value(i));
              }
              if (request.body() != null) {
                console.log("[BODY] " + request.body().toString());
              }
              return this.newCall(request);
            };
          });
          FRIDA
          # Launch the app and capture
          waydroid app launch com.zapero.app &
          sleep 10
          frida -U -l capture.js com.zapero.app &
          sleep 60
          kill %1 %2 || true
      - name: Upload captured logs
        uses: actions/upload-artifact@v4
        with:
          name: frida-capture
          path: /tmp/frida-output.txt

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhantomLink — Ghost Fleet Command</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #0a0a0f; color: #e0e0e0; padding: 2rem; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #1a1a2e; }
    .header h1 { font-size: 1.8rem; background: linear-gradient(135deg, #00d4aa, #7b61ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: #12121a; border: 1px solid #1e1e32; border-radius: 12px; padding: 1.2rem; }
    .stat-card .label { font-size: 0.8rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-card .value { font-size: 1.5rem; font-weight: 700; margin-top: 0.3rem; }
    .value.green { color: #00d4aa; } .value.red { color: #ef4444; } .value.blue { color: #7b61ff; }
    .controls { background: #12121a; border: 1px solid #1e1e32; border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; }
    .controls h3 { margin-bottom: 1rem; color: #7b61ff; }
    .form-row { display: flex; gap: 1rem; align-items: end; flex-wrap: wrap; }
    .form-group { display: flex; flex-direction: column; gap: 0.3rem; }
    .form-group label { font-size: 0.75rem; color: #6b7280; text-transform: uppercase; }
    select, input { background: #0a0a0f; border: 1px solid #1e1e32; border-radius: 8px; padding: 0.6rem 1rem; color: #e0e0e0; font-size: 0.9rem; }
    button { background: linear-gradient(135deg, #7b61ff, #00d4aa); border: none; border-radius: 8px; padding: 0.6rem 1.5rem; color: #fff; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    button:hover { opacity: 0.85; }
    table { width: 100%; border-collapse: collapse; background: #12121a; border-radius: 12px; overflow: hidden; border: 1px solid #1e1e32; }
    th, td { padding: 0.8rem 1rem; text-align: left; }
    th { background: #1a1a2e; color: #6b7280; font-size: 0.75rem; text-transform: uppercase; }
    td { border-bottom: 1px solid #1a1a2e; }
    .status-badge { padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .status-active { background: #065f46; color: #00d4aa; }
    .status-ready { background: #1e3a5f; color: #60a5fa; }
    .status-banned { background: #7f1d1d; color: #ef4444; }
    .refresh-info { font-size: 0.75rem; color: #6b7280; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="header">
    <h1>⚡ PhantomLink — Ghost Fleet Command</h1>
    <span style="color: #6b7280;">v1.0.0</span>
  </div>

  <div class="stats-grid" id="stats">
    <div class="stat-card"><div class="label">Active Ghosts</div><div class="value green" id="stat-active">0</div></div>
    <div class="stat-card"><div class="label">Total Sessions</div><div class="value blue" id="stat-total">0</div></div>
    <div class="stat-card"><div class="label">Banned</div><div class="value red" id="stat-banned">0</div></div>
    <div class="stat-card"><div class="label">Earnings (NGN)</div><div class="value green" id="stat-earnings">₦0.00</div></div>
  </div>

  <div class="controls">
    <h3>🚀 Start Operation</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Platform</label>
        <select id="platform">
          <option value="zapero">Zapero</option>
          <option value="waegy">Waegy</option>
          <option value="wha7">Wha7.org</option>
          <option value="letshare">Letshare</option>
          <option value="taskgo8">Taskgo8</option>
        </select>
      </div>
      <div class="form-group">
        <label>Mode</label>
        <select id="mode">
          <option value="ghost_reflect">Ghost Reflect (API)</option>
          <option value="ghost_account">Ghost Account (WhatsApp)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Accounts</label>
        <input type="number" id="num_accounts" value="1" min="1" max="50" style="width:80px;">
      </div>
      <button onclick="startOperation()">Launch ▶</button>
    </div>
  </div>

  <h3 style="margin-bottom: 1rem;">📊 Fleet Monitor</h3>
  <table>
    <thead>
      <tr><th>Session ID</th><th>Phone</th><th>Platform</th><th>Status</th><th>Earnings</th><th>Created</th></tr>
    </thead>
    <tbody id="sessions-table"><tr><td colspan="6" style="text-align:center;color:#6b7280;">No active sessions</td></tr></tbody>
  </table>
  <div class="refresh-info">Auto-refreshes every 5 seconds</div>

  <script>
    const API = 'http://localhost:8000';

    async function fetchStats() {
      try {
        const r = await fetch(`${API}/api/stats`);
        const data = await r.json();
        document.getElementById('stat-active').textContent = data.active_sessions;
        document.getElementById('stat-total').textContent = data.total_sessions;
        document.getElementById('stat-banned').textContent = data.banned;
        document.getElementById('stat-earnings').textContent = `₦${data.total_earnings_ngn.toFixed(2)}`;
      } catch(e) { console.error(e); }
    }

    async function fetchSessions() {
      try {
        const r = await fetch(`${API}/api/sessions`);
        const sessions = await r.json();
        const tbody = document.getElementById('sessions-table');
        if (!sessions.length) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#6b7280;">No active sessions</td></tr>';
          return;
        }
        tbody.innerHTML = sessions.map(s => `
          <tr>
            <td style="font-family:monospace;">${s.session_id}</td>
            <td>${s.phone_number || '—'}</td>
            <td>${s.platform}</td>
            <td><span class="status-badge status-${s.status === 'linked' ? 'active' : s.status === 'banned' ? 'banned' : 'ready'}">${s.status}</span></td>
            <td>₦${s.earnings.toFixed(2)}</td>
            <td>${new Date(s.created_at).toLocaleDateString()}</td>
          </tr>
        `).join('');
      } catch(e) { console.error(e); }
    }

    async function startOperation() {
      const platform = document.getElementById('platform').value;
      const mode = document.getElementById('mode').value;
      const num_accounts = parseInt(document.getElementById('num_accounts').value);
      try {
        const r = await fetch(`${API}/api/start-operation`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ platform, mode, num_accounts }),
        });
        const data = await r.json();
        alert(`Operation ${data.op_id} started with ${num_accounts} account(s)`);
        refreshAll();
      } catch(e) { alert('Error: ' + e.message); }
    }

    function refreshAll() { fetchStats(); fetchSessions(); }
    refreshAll();
    setInterval(refreshAll, 5000);
  </script>
</body>
</html>
